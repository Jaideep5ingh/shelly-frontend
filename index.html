<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Shelly | All your newsletters in a nutshell</title>
    <meta
      name="description"
      content="Shelly turns inbox overload into one calm daily digest. Join the early access list or send feedback."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <div>
          <div class="eyebrow">Shelly</div>
          <h1>All your newsletters in a nutshell.</h1>
          <p class="lede">
            Shelly subscribes to your favorite newsletters and combines them into one calm, AI-curated morning brief.
          </p>
        </div>
        <div class="hero-card">
          <div class="hero-card__title">Multiple sources</div>
          <div class="merge-visual" aria-hidden="true">
            <div class="pill a">TLDR</div>
            <div class="pill b">Lenny</div>
            <div class="pill c">Rundown</div>
            <div class="digest">One digest</div>
          </div>
        </div>
      </header>

      <main class="grid">
        <section class="card">
          <h2>Join the beta</h2>
          <form id="subscribe-form" class="form">
            <label>
              Email
              <input id="subscribe-email" type="email" name="email" placeholder="you@example.com" required />
            </label>
            <input id="subscribe-website" name="website" type="text" autocomplete="off" tabindex="-1" class="hp" />
            <button type="submit">Add to list</button>
            <p id="subscribe-status" class="status"></p>
          </form>
        </section>

        <section class="card">
          <h2>Send feedback</h2>
          <form id="feedback-form" class="form">
            <label>
              Email
              <input id="feedback-email" type="email" name="email" placeholder="you@example.com" required />
            </label>
            <label>
              Feedback
              <textarea id="feedback-text" name="feedback" rows="5" placeholder="Tell us what would make Shelly better." required></textarea>
            </label>
            <input id="feedback-website" name="website" type="text" autocomplete="off" tabindex="-1" class="hp" />
            <button type="submit">Send feedback</button>
            <p id="feedback-status" class="status"></p>
          </form>
        </section>
      </main>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
